version: '3.8'

services:
  web:
    build: .
    container_name: rayaninv-app
    restart: always
    ports:
      - "3003:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_NAME=RayanInv
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://inv.rayan.web.id
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=rayaninv
      - DB_USERNAME=rayaninv
      - DB_PASSWORD=rayaninv_secure_pass
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=sync
      - LOG_CHANNEL=stderr
    volumes:
      - rayaninv_storage:/var/www/html/storage

  db:
    image: postgres:15-alpine
    container_name: rayaninv-db
    restart: always
    environment:
      - POSTGRES_DB=rayaninv
      - POSTGRES_USER=rayaninv
      - POSTGRES_PASSWORD=rayaninv_secure_pass
    volumes:
      - rayaninv_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rayaninv -d rayaninv"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rayaninv_storage:
  rayaninv_pgdata:
